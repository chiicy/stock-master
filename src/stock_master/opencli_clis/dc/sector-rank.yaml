site: dc
name: sector-rank
description: 获取东方财富板块排行，支持概念/行业/地域
domain: quote.eastmoney.com
browser: true
strategy: cookie
navigateBefore: false

args:
  kind:
    type: str
    default: industry
    description: 板块类型：industry / concept / region
  limit:
    type: int
    default: 20
    description: 返回数量，默认 20，最大 100
  sort:
    type: str
    default: desc
    description: 排序方向：desc 涨幅榜 / asc 跌幅榜

pipeline:
  - navigate: https://quote.eastmoney.com/center/gridlist.html#hs_a_board
  - evaluate: |
      (async () => {
        const kind = String(${{ args.kind | json }} || 'industry').trim().toLowerCase();
        const limit = Math.max(1, Math.min(100, Number(${{ args.limit | json }} || 20)));
        const sort = String(${{ args.sort | json }} || 'desc').trim().toLowerCase();
        const fsMap = {
          concept: 'm:90+t:3+f:!50',
          industry: 'm:90+t:2+f:!50',
          region: 'm:90+t:1+f:!50',
        };
        const fs = fsMap[kind];
        if (!fs) throw new Error('Unsupported kind: ' + kind);
        const po = sort === 'asc' ? 0 : 1;
        const url = `https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=${limit}&po=${po}&np=1&ut=bd1d9ddb04089700cf9c27f6f7426281&fltt=2&invt=2&fid=f3&fs=${encodeURIComponent(fs)}&fields=f12,f14,f2,f3,f4,f5,f6,f7,f8,f9,f10`;
        const resp = await fetch(url, { credentials: 'include' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const rows = (await resp.json())?.data?.diff || [];
        return rows.map((r, i) => ({
          rank: i + 1,
          kind,
          boardCode: r.f12 || null,
          name: r.f14 || null,
          latest: r.f2 ?? null,
          changePercent: r.f3 ?? null,
          changeAmount: r.f4 ?? null,
          volume: r.f5 ?? null,
          amount: r.f6 ?? null,
          amplitude: r.f7 ?? null,
          turnoverRate: r.f8 ?? null,
          pe: r.f9 ?? null,
          volumeRatio: r.f10 ?? null,
          source: 'eastmoney.push2.clist.get'
        }));
      })()

columns: [rank, kind, boardCode, name, latest, changePercent, changeAmount, amount, turnoverRate, pe, volumeRatio]
