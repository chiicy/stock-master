site: dc
name: _probe_sector
description: probe eastmoney board ranking fs mappings
domain: quote.eastmoney.com
browser: true
strategy: cookie
navigateBefore: false

args:
  limit:
    type: int
    default: 5

pipeline:
  - navigate: https://quote.eastmoney.com/center/gridlist.html#hs_a_board
  - evaluate: |
      (async () => {
        const limit = Math.max(1, Math.min(20, Number(${{ args.limit | json }} || 5)));
        const cases = [
          ['concept', 'm:90+t:3+f:!50'],
          ['industry', 'm:90+t:2+f:!50'],
          ['region', 'm:90+t:1+f:!50']
        ];
        const out = [];
        for (const [kind, fs] of cases) {
          const url = `https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=${limit}&po=1&np=1&ut=bd1d9ddb04089700cf9c27f6f7426281&fltt=2&invt=2&fid=f3&fs=${encodeURIComponent(fs)}&fields=f12,f14,f2,f3,f4,f5,f6,f7,f8,f9,f10`;
          try {
            const resp = await fetch(url, { credentials: 'include' });
            const text = await resp.text();
            let json = null;
            try { json = JSON.parse(text); } catch {}
            out.push({ kind, fs, ok: resp.ok, status: resp.status, total: json?.data?.total ?? null, sample: text.slice(0, 400) });
          } catch (e) {
            out.push({ kind, fs, error: String(e) });
          }
        }
        return out;
      })()
