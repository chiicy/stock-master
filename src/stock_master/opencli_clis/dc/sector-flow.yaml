site: dc
name: sector-flow
description: 获取东方财富板块主力资金日线流向
domain: quote.eastmoney.com
browser: true
strategy: cookie
navigateBefore: false

args:
  board_code:
    type: str
    required: true
    description: 板块代码，如 BK1320
  days:
    type: int
    default: 20
    description: 返回最近多少天，默认 20，最大 120

pipeline:
  - navigate: https://quote.eastmoney.com/center/gridlist.html#hs_a_board
  - evaluate: |
      (async () => {
        const boardCode = String(${{ args.board_code | json }} || '').trim().toUpperCase();
        const days = Math.max(1, Math.min(120, Number(${{ args.days | json }} || 20)));
        if (!boardCode) throw new Error('Missing argument: board_code');
        const secid = `90.${boardCode}`;
        const quoteUrl = `https://push2.eastmoney.com/api/qt/stock/get?secid=${encodeURIComponent(secid)}&ut=bd1d9ddb04089700cf9c27f6f7426281&invt=2&fltt=2&fields=f57,f58,f43,f44,f45,f46,f47,f48,f60,f170,f171`;
        const flowUrl = `https://push2.eastmoney.com/api/qt/stock/fflow/kline/get?secid=${encodeURIComponent(secid)}&lmt=${days}&klt=101&fields1=f1,f2,f3,f7&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61,f62,f63`;
        const [quoteResp, flowResp] = await Promise.all([
          fetch(quoteUrl, { credentials: 'include' }),
          fetch(flowUrl, { credentials: 'include' }),
        ]);
        if (!quoteResp.ok) throw new Error('quote HTTP ' + quoteResp.status);
        if (!flowResp.ok) throw new Error('flow HTTP ' + flowResp.status);
        const q = (await quoteResp.json())?.data || {};
        const d = (await flowResp.json())?.data || {};
        const lines = Array.isArray(d.klines) ? d.klines : [];
        return lines.map((line) => {
          const [date, mainNetInflow, smallNetInflow, mediumNetInflow, largeNetInflow, superLargeNetInflow] = String(line).split(',');
          return {
            boardCode,
            name: q.f58 || d.name || null,
            current: q.f43 ?? null,
            changePercent: q.f170 ?? null,
            amplitude: q.f171 ?? null,
            date,
            mainNetInflow: mainNetInflow == null ? null : Number(mainNetInflow),
            smallNetInflow: smallNetInflow == null ? null : Number(smallNetInflow),
            mediumNetInflow: mediumNetInflow == null ? null : Number(mediumNetInflow),
            largeNetInflow: largeNetInflow == null ? null : Number(largeNetInflow),
            superLargeNetInflow: superLargeNetInflow == null ? null : Number(superLargeNetInflow),
            source: 'eastmoney.push2.stock.get + eastmoney.push2.stock.fflow.kline.get'
          };
        });
      })()

columns: [date, boardCode, name, current, changePercent, mainNetInflow, smallNetInflow, mediumNetInflow, largeNetInflow, superLargeNetInflow]
