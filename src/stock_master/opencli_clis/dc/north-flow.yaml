site: dc
name: north-flow
description: 获取东方财富北向/南向资金快照
domain: quote.eastmoney.com
browser: true
strategy: cookie
navigateBefore: false

pipeline:
  - navigate: https://quote.eastmoney.com/center/gridlist.html#hs_a_board
  - evaluate: |
      (async () => {
        const url = 'https://push2.eastmoney.com/api/qt/kamt/get?fields1=f1,f2,f3,f4&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61,f62,f63';
        const resp = await fetch(url, { credentials: 'include' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const d = (await resp.json())?.data || {};
        const pick = (key, label) => {
          const x = d[key] || {};
          return {
            flow: label,
            date: x.date2 || x.date || null,
            status: x.status ?? null,
            dayNetAmtIn: x.dayNetAmtIn ?? null,
            dayAmtRemain: x.dayAmtRemain ?? null,
            dayAmtThreshold: x.dayAmtThreshold ?? null,
            monthNetAmtIn: x.monthNetAmtIn ?? null,
            yearNetAmtIn: x.yearNetAmtIn ?? null,
            allNetAmtIn: x.allNetAmtIn ?? null,
            buyAmt: x.buyAmt ?? null,
            sellAmt: x.sellAmt ?? null,
            buySellAmt: x.buySellAmt ?? null,
            netBuyAmt: x.netBuyAmt ?? null,
            source: 'eastmoney.push2.kamt.get'
          };
        };
        return [
          pick('hk2sh', 'northbound_shanghai'),
          pick('hk2sz', 'northbound_shenzhen'),
          pick('sh2hk', 'southbound_shanghai'),
          pick('sz2hk', 'southbound_shenzhen')
        ];
      })()

columns: [flow, date, dayNetAmtIn, monthNetAmtIn, yearNetAmtIn, allNetAmtIn, buyAmt, sellAmt, netBuyAmt]
