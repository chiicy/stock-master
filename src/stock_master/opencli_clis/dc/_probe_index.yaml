site: dc
name: _probe_index
description: probe eastmoney index quote/history endpoints
domain: quote.eastmoney.com
browser: true
strategy: cookie
navigateBefore: false

args:
  secid:
    type: str
    default: 1.000001
    description: 指数 secid，如上证指数 1.000001，深证成指 0.399001

pipeline:
  - navigate: https://quote.eastmoney.com/center/gridlist.html#hs_a_board
  - evaluate: |
      (async () => {
        const secid = (${{ args.secid | json }} || '1.000001').trim();
        const urls = [
          `https://push2.eastmoney.com/api/qt/stock/get?secid=${encodeURIComponent(secid)}&ut=bd1d9ddb04089700cf9c27f6f7426281&invt=2&fltt=2&fields=f57,f58,f43,f44,f45,f46,f47,f48,f60,f116,f170,f171`,
          `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${encodeURIComponent(secid)}&ut=fa5fd1943c7b386f172d6893dbfba10b&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=0&beg=0&end=20500000&lmt=120`
        ];
        const out = [];
        for (const url of urls) {
          try {
            const resp = await fetch(url, { credentials: 'include' });
            const text = await resp.text();
            let json = null;
            try { json = JSON.parse(text); } catch {}
            out.push({ url, ok: resp.ok, status: resp.status, sample: text.slice(0, 500), keys: json?.data ? Object.keys(json.data).slice(0, 30) : null, klines: json?.data?.klines?.length ?? null });
          } catch (e) {
            out.push({ url, error: String(e) });
          }
        }
        return out;
      })()
