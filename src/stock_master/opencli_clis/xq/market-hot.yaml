site: xq
name: market-hot
description: 获取雪球热股榜，并对榜单类型做语义化封装
domain: xueqiu.com
browser: true
strategy: cookie
navigateBefore: false

args:
  category:
    type: str
    default: popularity
    description: 榜单类别：popularity(人气榜)、watchlist(关注榜)；也兼容 10/11/12 这类原始 type
  limit:
    type: int
    default: 20
    description: 返回数量，默认 20，最大 100

pipeline:
  - navigate: https://xueqiu.com
  - evaluate: |
      (async () => {
        const rawCategory = String(${{ args.category | json }} || 'popularity').trim().toLowerCase();
        const count = Math.max(1, Math.min(100, Number(${{ args.limit | json }} || 20)));
        const typeMap = {
          popularity: '10',
          hot: '10',
          focus: '12',
          watchlist: '12',
          follow: '12',
          latest: '11'
        };
        const type = typeMap[rawCategory] || (/^\d+$/.test(rawCategory) ? rawCategory : '10');
        const category = Object.entries(typeMap).find(([, v]) => v === type)?.[0] || rawCategory;
        const url = `https://stock.xueqiu.com/v5/stock/hot_stock/list.json?size=${count}&type=${encodeURIComponent(type)}`;
        const resp = await fetch(url, { credentials: 'include' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status + ' Hint: Not logged in?');
        const d = await resp.json();
        const rows = Array.isArray(d?.data?.items) ? d.data.items : Array.isArray(d?.data) ? d.data : [];
        return rows.map((r, i) => {
          const s = r.stock || r;
          return {
            rank: i + 1,
            category,
            type,
            symbol: s.symbol || null,
            code: s.symbol ? String(s.symbol).replace(/^[A-Z]+/, '') : null,
            name: s.name || null,
            current: s.current ?? null,
            percent: s.percent ?? null,
            change: s.chg ?? null,
            marketCap: s.market_capital ?? null,
            floatMarketCap: s.float_market_capital ?? null,
            heat: r.value ?? r.follow7dIncrease ?? r.follow7d ?? r.follow ?? null,
            rankChange: r.rank_change ?? null,
            url: s.symbol ? 'https://xueqiu.com/S/' + s.symbol : null,
            source: 'xueqiu.hot_stock.list'
          };
        });
      })()

columns: [rank, category, type, symbol, name, current, percent, change, marketCap, floatMarketCap, heat, rankChange]
